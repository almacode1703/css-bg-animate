<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient</title>
  
      <style>

          header {
            height: 300px;
            width: 100%;
            position: relative;
            border: 2px solid;
            background-image: linear-gradient(to bottom, yellow , green , blue);
          }

          h1{
            position: absolute;
            transform: translate(-50%, -50%);
            top: 50%;
            left: 50%;
            font-size:72px;
            font-family:Helvetica;
            color:  white;
          }

      </style>

</head>
<body>
    
    <header>
        <h1>Example of Linear Gradient</h1>
    </header>


</body>
</html>
