<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>

    <style>    
     .bg-property {
        height: 400px;
        width: 400px;
        border: 4px solid;
        background-color: lightgreen;
        background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjwH1zV1iaKtvsI1Rjy05byIGuBOUsg_d7vw&s");
        background-repeat: no-repeat;
        background-position: top left;
        background-attachment: fixed;
      }

      .spacer {
        height: 1000px;
      }
    </style>

</head>
<body>
    <div class="bg-property"></div>
    <div class="spacer"></div>
</body>
</html>
